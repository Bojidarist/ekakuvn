<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>ekakuvn - Editor</title>
		<link href="editor.css" rel="stylesheet">
	</head>
	<body>
		<div id="editor-root">
			<!-- Toolbar -->
			<header id="toolbar">
				<div class="toolbar-group">
					<span class="toolbar-brand">ekakuvn</span>
					<button id="btn-new" title="New Project">New</button>
					<button id="btn-open" title="Open Project">Open</button>
					<button id="btn-save" title="Save/Export Project">Save / Export</button>
				</div>
			<div class="toolbar-group">
				<button id="btn-toggle-textbox" title="Toggle Textbox Preview">Textbox</button>
				<button id="btn-theme" title="Edit Theme">Theme</button>
				<button id="btn-preview" title="Play Preview">Preview</button>
			</div>
			</header>

			<!-- Main content area -->
			<div id="editor-body">
				<!-- Left sidebar: Scenes + Assets -->
				<aside id="panel-left">
					<section id="scene-list-panel">
						<div class="panel-header">
							<h3>Scenes</h3>
							<button id="btn-add-scene" title="Add Scene">+</button>
						</div>
						<ul id="scene-list"></ul>
					</section>
				<section id="asset-panel">
					<div class="panel-header">
						<h3>Assets</h3>
						<div class="panel-header-actions">
							<button id="btn-add-folder" title="New Folder">&#128193;</button>
							<button id="btn-add-asset" title="Import Asset">+</button>
						</div>
					</div>
					<div id="asset-grid"></div>
				</section>
				</aside>

				<div class="resize-handle resize-handle-left" id="resize-left"></div>

				<!-- Center: Canvas preview -->
				<main id="panel-center">
					<div id="canvas-container">
						<canvas id="editor-canvas" width="1280" height="720"></canvas>
					</div>
				</main>

				<div class="resize-handle resize-handle-right" id="resize-right"></div>

				<!-- Right sidebar: Properties -->
				<aside id="panel-right">
					<section id="properties-panel">
						<div class="panel-header">
							<h3>Properties</h3>
						</div>
						<div id="properties-content"></div>
					</section>
				</aside>
			</div>

			<div class="resize-handle resize-handle-bottom" id="resize-bottom"></div>

		<!-- Bottom: Timeline editor -->
		<footer id="panel-bottom">
			<section id="timeline-panel">
				<div class="timeline-body">
					<div class="timeline-main">
						<div class="panel-header">
							<h3>Timeline</h3>
						</div>
						<div id="timeline-list"></div>
					</div>
					<div class="timeline-sidebar">
						<div class="panel-header">
							<h3>Elements</h3>
						</div>
						<div id="timeline-elements"></div>
					</div>
				</div>
			</section>
		</footer>
		</div>

		<!-- Play preview overlay -->
		<div id="play-preview" class="play-preview-overlay hidden">
			<div class="play-preview-header">
				<span class="play-preview-title">PLAY PREVIEW</span>
				<button id="btn-preview-close" class="play-preview-close">Close (Esc)</button>
			</div>
		</div>

		<!-- Hidden file input for opening/importing -->
		<input type="file" id="file-input-script" accept=".evn,.json,.ekaku.json" style="display:none">
		<input type="file" id="file-input-asset" accept="image/*,audio/*" multiple style="display:none">

		<script src="editor.js" type="module"></script>
	</body>
</html>
